name: Build & Release Chrome Extension

# Trigger by pushing a tag in the format: <extension-name>/v<semver>
# e.g.  git tag hello-world/v1.0.0 && git push origin hello-world/v1.0.0
on:
  push:
    tags:
      - '*/v[0-9]*.[0-9]*.[0-9]*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create releases and push README update

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout full history so we can push back to main later
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # 2. Parse the tag into extension name + semver version
      #    Tag format: hello-world/v1.2.3
      #    Outputs:
      #      extension    = hello-world
      #      version      = v1.2.3
      #      asset        = hello-world-v1.2.3.zip   (versioned)
      #      latest_tag   = hello-world/latest
      #      latest_asset = hello-world-latest.zip   (stable, always current)
      # -----------------------------------------------------------------------
      - name: Parse tag
        id: tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          EXTENSION="${TAG%/v*}"
          VERSION="v${TAG#*/v}"
          echo "extension=$EXTENSION"                    >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"                        >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"                                >> "$GITHUB_OUTPUT"
          echo "asset=${EXTENSION}-${VERSION}.zip"       >> "$GITHUB_OUTPUT"
          echo "latest_tag=${EXTENSION}/latest"          >> "$GITHUB_OUTPUT"
          echo "latest_asset=${EXTENSION}-latest.zip"   >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # 3. Validate the extension directory exists
      # -----------------------------------------------------------------------
      - name: Validate extension directory
        run: |
          DIR="extensions/${{ steps.tag.outputs.extension }}"
          if [ ! -d "$DIR" ]; then
            echo "Error: directory '$DIR' not found in repo."
            exit 1
          fi
          if [ ! -f "$DIR/manifest.json" ]; then
            echo "Error: '$DIR/manifest.json' not found."
            exit 1
          fi
          echo "Extension directory OK: $DIR"

      # -----------------------------------------------------------------------
      # 4. Stamp the semver into manifest.json so the built artefact is correct
      # -----------------------------------------------------------------------
      - name: Stamp version into manifest.json
        run: |
          SEMVER="${{ steps.tag.outputs.version }}"
          SEMVER="${SEMVER#v}"   # strip leading 'v' — manifest wants '1.2.3'
          jq --arg v "$SEMVER" '.version = $v' \
            extensions/${{ steps.tag.outputs.extension }}/manifest.json \
            > /tmp/manifest.json
          mv /tmp/manifest.json extensions/${{ steps.tag.outputs.extension }}/manifest.json
          echo "manifest.json stamped with version $SEMVER"

      # -----------------------------------------------------------------------
      # 5. Build — zip the extension directory
      #    Produces two zips:
      #      hello-world-v1.2.3.zip  — versioned, attached to the semver release
      #      hello-world-latest.zip  — stable name, attached to the latest release
      # -----------------------------------------------------------------------
      - name: Build extension zip
        run: |
          cd extensions/${{ steps.tag.outputs.extension }}
          zip -r "${{ github.workspace }}/${{ steps.tag.outputs.asset }}" . \
            --exclude "*.DS_Store" \
            --exclude "__MACOSX/*"
          cp "${{ github.workspace }}/${{ steps.tag.outputs.asset }}" \
             "${{ github.workspace }}/${{ steps.tag.outputs.latest_asset }}"
          echo "Built: ${{ steps.tag.outputs.asset }}"
          echo "Built: ${{ steps.tag.outputs.latest_asset }}"
          ls -lh "${{ github.workspace }}"/*.zip

      # -----------------------------------------------------------------------
      # 6. Create the versioned GitHub Release (e.g. hello-world/v1.2.3)
      #    This is the permanent, immutable record of each release.
      # -----------------------------------------------------------------------
      - name: Create versioned release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            "${{ steps.tag.outputs.asset }}" \
            --title "${{ steps.tag.outputs.extension }} ${{ steps.tag.outputs.version }}" \
            --notes "## ${{ steps.tag.outputs.extension }} ${{ steps.tag.outputs.version }}

          Automated release built by GitHub Actions.

          ### Installation
          1. Download the zip below and extract it.
          2. Open Chrome and navigate to \`chrome://extensions\`.
          3. Enable **Developer mode** (top-right toggle).
          4. Click **Load unpacked** and select the extracted folder." \
            --latest=false

      # -----------------------------------------------------------------------
      # 7. Create/update the stable latest release (e.g. hello-world/latest)
      #    This release is deleted and recreated on every new version so that
      #    the download URL never changes — useful for scripted installs and
      #    the README link, which always resolves to the current release.
      # -----------------------------------------------------------------------
      - name: Update latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_TAG="${{ steps.tag.outputs.latest_tag }}"
          LATEST_ASSET="${{ steps.tag.outputs.latest_asset }}"

          # Remove old latest release + tag (ignore errors if first run)
          gh release delete "$LATEST_TAG" --yes 2>/dev/null || true
          git push origin ":refs/tags/${LATEST_TAG}" 2>/dev/null || true

          # Force-create the tag at the current commit
          git tag -f "$LATEST_TAG"
          git push origin "refs/tags/${LATEST_TAG}" --force

          # Create the fresh latest release
          gh release create "$LATEST_TAG" \
            "$LATEST_ASSET" \
            --title "${{ steps.tag.outputs.extension }} (latest)" \
            --notes "Always points to the latest version. Current: **${{ steps.tag.outputs.version }}**

          The download URL for this release never changes — link to it directly or use it in install scripts." \
            --latest

      # -----------------------------------------------------------------------
      # 8. The stable latest download URL is deterministic — no API call needed.
      #    Format: {server}/{repo}/releases/download/{extension}/latest/{extension}-latest.zip
      # -----------------------------------------------------------------------
      - name: Construct stable latest URL
        id: asset_url
        run: |
          URL="${{ github.server_url }}/${{ github.repository }}/releases/download/${{ steps.tag.outputs.latest_tag }}/${{ steps.tag.outputs.latest_asset }}"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Stable latest URL: $URL"

      # -----------------------------------------------------------------------
      # 9. Switch to main, update the README table, and push.
      #    The README link uses the stable latest URL so it never needs updating
      #    again — only the displayed version number changes each release.
      # -----------------------------------------------------------------------
      - name: Update README on main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Switch to main (the tag checkout leaves us in detached HEAD)
          git fetch origin main
          git checkout main
          git pull origin main

          # Run the README updater
          python3 scripts/update_readme.py \
            "${{ steps.tag.outputs.extension }}" \
            "${{ steps.tag.outputs.version }}" \
            "${{ steps.asset_url.outputs.url }}"

          # Commit and push only if README changed
          if git diff --quiet README.md; then
            echo "README.md unchanged — nothing to commit."
          else
            git add README.md
            git commit -m "docs: update download link — ${{ steps.tag.outputs.extension }} ${{ steps.tag.outputs.version }}"
            git push origin main
          fi
