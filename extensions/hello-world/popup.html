<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello World</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 280px;
        padding: 24px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f172a;
        color: #f1f5f9;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
      }

      .dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #22c55e;
        box-shadow: 0 0 8px #22c55e;
      }

      h1 {
        font-size: 18px;
        font-weight: 600;
        letter-spacing: -0.3px;
      }

      .message {
        font-size: 14px;
        color: #94a3b8;
        line-height: 1.5;
        margin-bottom: 16px;
      }

      .version {
        display: inline-block;
        font-size: 11px;
        font-family: monospace;
        background: #1e293b;
        color: #64748b;
        padding: 4px 8px;
        border-radius: 4px;
        border: 1px solid #334155;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="dot"></div>
      <h1>Hello World</h1>
    </div>
    <p class="message">Pipeline is working! This extension was built and released automatically via GitHub Actions.</p>
    <span class="version" id="version">v0.0.0</span>
    <script src="popup.js"></script>
  </body>
</html>
