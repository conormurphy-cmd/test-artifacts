<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Price Ticker</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 300px;
        padding: 20px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f172a;
        color: #f1f5f9;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
      }

      .title {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #3b82f6;
        box-shadow: 0 0 8px #3b82f6;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }

      h1 {
        font-size: 16px;
        font-weight: 600;
      }

      .version {
        font-size: 10px;
        font-family: monospace;
        color: #475569;
      }

      .prices {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 12px;
        background: #1e293b;
        border-radius: 6px;
        border: 1px solid #334155;
      }

      .market {
        font-size: 13px;
        font-weight: 500;
        color: #cbd5e1;
      }

      .price {
        font-size: 13px;
        font-family: monospace;
        font-weight: 600;
      }

      .up   { color: #22c55e; }
      .down { color: #ef4444; }
      .flat { color: #94a3b8; }

      .change {
        font-size: 11px;
        font-family: monospace;
        margin-left: 8px;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="title">
        <div class="dot"></div>
        <h1>Price Ticker</h1>
      </div>
      <span class="version" id="version">v0.0.0</span>
    </div>
    <div class="prices" id="prices"></div>
    <script src="popup.js"></script>
  </body>
</html>
